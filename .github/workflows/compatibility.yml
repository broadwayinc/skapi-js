name: Package Compatibility

on:
  push:
    branches: [main, hybrid]
  pull_request:
  workflow_dispatch:

jobs:
  runtime-and-types:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (with npm cache)
        if: ${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            npm-shrinkwrap.json

      - name: Setup Node (without cache)
        if: ${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') == '' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies (locked)
        if: ${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') != '' }}
        run: npm ci

      - name: Install dependencies (no lockfile)
        if: ${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') == '' }}
        run: npm install

      - name: Build package artifacts
        run: npm run build

      - name: Verify build artifacts exist
        run: |
          test -f js/Main.d.ts
          test -f dist/skapi.cjs

      - name: Pack npm tarball
        run: |
          PKG_TGZ=$(npm pack | tail -n 1)
          echo "PKG_TGZ=$PKG_TGZ" >> "$GITHUB_ENV"

      - name: Create consumer project and install package
        run: |
          CONSUMER_DIR=$(mktemp -d /tmp/skapi-consumer-XXXX)
          echo "CONSUMER_DIR=$CONSUMER_DIR" >> "$GITHUB_ENV"
          cd "$CONSUMER_DIR"
          npm init -y
          npm install "$GITHUB_WORKSPACE/$PKG_TGZ" typescript@5.9.3

      - name: Verify declaration files are published
        run: |
          cd "$CONSUMER_DIR"
          test -f node_modules/skapi-js/js/Main.d.ts

      - name: Verify CommonJS require()
        run: |
          cd "$CONSUMER_DIR"
          node -e "const { Skapi } = require('skapi-js'); if (typeof Skapi !== 'function') { throw new Error('Skapi export is not a function'); }"

      - name: Verify Node ESM import
        run: |
          cd "$CONSUMER_DIR"
          node --input-type=module -e "import { Skapi } from 'skapi-js'; if (typeof Skapi !== 'function') { throw new Error('Skapi export is not a function'); }"

      - name: Verify TypeScript imports and type visibility
        run: |
          cd "$CONSUMER_DIR"
          cat > consumer.ts << 'EOF'
          import { Skapi } from 'skapi-js';
          import type { RecordData, DatabaseResponse } from 'skapi-js';

          const sdk = new Skapi('SERVICE_ID');
          let record: RecordData | null = null;
          let databaseRecords: DatabaseResponse<RecordData> | null = null;

          void sdk;
          void record;
          void databaseRecords;
          EOF

          if ! npx tsc --noEmit --target ES2020 --module NodeNext --moduleResolution NodeNext consumer.ts; then
            npx tsc --traceResolution --noEmit --target ES2020 --module NodeNext --moduleResolution NodeNext consumer.ts || true
            exit 1
          fi

      - name: Verify browser UMD artifact is published
        run: |
          cd "$CONSUMER_DIR"
          test -f node_modules/skapi-js/dist/skapi.js
