name: Package Compatibility

on:
  push:
    branches: [main, hybrid]
  pull_request:
  workflow_dispatch:

jobs:
  runtime-and-types:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (with npm cache)
        if: ${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            npm-shrinkwrap.json

      - name: Setup Node (without cache)
        if: ${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') == '' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies (locked)
        if: ${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') != '' }}
        run: npm ci

      - name: Install dependencies (no lockfile)
        if: ${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') == '' }}
        run: npm install

      - name: Build package artifacts
        run: npm run build

      - name: Verify build artifacts exist
        run: |
          test -f dist/skapi.d.ts
          test -f dist/skapi.cjs
          test -f dist/skapi.mjs
          test -f dist/skapi.js

      - name: Verify Node consumer imports
        run: npm run test:node-imports
